<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOC — TXT to PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/Styles/txt-to-pdf.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <a href="index.html" class="back-link">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back
  </a>

  <header class="header">
    <h1>TXT to PDF</h1>
    <p>Convert plain text files into downloadable PDFs</p>
  </header>

  <main>
    <div class="card">

      <!-- Drop zone -->
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".txt" multiple />
        <div class="dropzone-icon">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="dropzone-title">Drop .txt files here or click to browse</div>
        <div class="dropzone-sub">Multiple files supported</div>
      </div>

      <!-- File list -->
      <div class="file-list" id="fileList"></div>

      <!-- Options -->
      <hr class="divider" id="divider" style="display:none;" />
      <div class="options" id="options" style="display:none;">
        <div class="option-row">
          <span class="option-label">Page size</span>
          <select class="option-select" id="pageSize">
            <option value="a4">A4</option>
            <option value="letter">Letter</option>
          </select>
        </div>
        <div class="option-row">
          <span class="option-label">Font size</span>
          <select class="option-select" id="fontSize">
            <option value="10">Small (10pt)</option>
            <option value="12" selected>Medium (12pt)</option>
            <option value="14">Large (14pt)</option>
          </select>
        </div>
        <div class="option-row">
          <span class="option-label">Output</span>
          <select class="option-select" id="outputMode">
            <option value="separate">One PDF per file</option>
            <option value="merged">Merge into one PDF</option>
          </select>
        </div>
      </div>

      <!-- Convert button -->
      <button class="convert-btn" id="convertBtn" disabled>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Convert to PDF
      </button>

      <!-- Toast -->
      <div class="toast" id="toast"></div>

    </div>
  </main>

  <footer class="footer">SOC Project &nbsp;·&nbsp; v0.1.0</footer>

  <script src="/Scripts/txt-to-pdf.js"></script>

</body>
</html>
